      type: object
      properties:
        tree:
          title: tree
          $ref: '#/components/schemas/workspace.v1.UsersetTree'
      title: ExpandResponse
      additionalProperties: false
    workspace.v1.GetGroupRequest:
      type: object
      properties:
        groupId:
          type: string
          title: group_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: GetGroupRequest
      additionalProperties: false
    workspace.v1.GetGroupResponse:
      type: object
      properties:
        group:
          title: group
          $ref: '#/components/schemas/workspace.v1.Group'
      title: GetGroupResponse
      additionalProperties: false
    workspace.v1.GetWorkspaceRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: GetWorkspaceRequest
      additionalProperties: false
    workspace.v1.GetWorkspaceResponse:
      type: object
      properties:
        workspace:
          title: workspace
          $ref: '#/components/schemas/workspace.v1.Workspace'
      title: GetWorkspaceResponse
      additionalProperties: false
    workspace.v1.Group:
      type: object
      properties:
        id:
          type: string
          title: id
        projectId:
          type: string
          title: project_id
        workspaceId:
          type: string
          title: workspace_id
          description: |-
            workspace_id optionally scopes the group to a workspace (a company's
             internal groups). Empty for project-level / standalone groups (a B2C
             user's "family" list).
        slug:
          type: string
          title: slug
        displayName:
          type: string
          title: display_name
        createdByUserId:
          type: string
          title: created_by_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Group
      additionalProperties: false
    workspace.v1.GroupMember:
      type: object
      oneOf:
        - properties:
            groupId:
              type: string
              title: group_id
          title: group_id
          required:
            - groupId
        - properties:
            userId:
              type: string
              title: user_id
          title: user_id
          required:
            - userId
      title: GroupMember
      additionalProperties: false
      description: GroupMember is either a user or a nested group.
    workspace.v1.Invitation:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        email:
          type: string
          title: email
        role:
          title: role
          $ref: '#/components/schemas/workspace.v1.Role'
        status:
          title: status
          $ref: '#/components/schemas/workspace.v1.InvitationStatus'
        invitedByUserId:
          type: string
          title: invited_by_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        token:
          type: string
          title: token
          description: |-
            token is returned ONLY from CreateInvitation so the caller can deliver
             it out of band; it is never echoed by ListInvitations.
      title: Invitation
      additionalProperties: false
    workspace.v1.ListGroupMembersRequest:
      type: object
      properties:
        groupId:
          type: string
          title: group_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: ListGroupMembersRequest
      additionalProperties: false
    workspace.v1.ListGroupMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.GroupMember'
          title: members
      title: ListGroupMembersResponse
      additionalProperties: false
    workspace.v1.ListGroupsRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
          description: 'optional: restrict to groups owned by this workspace.'
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: ListGroupsRequest
      additionalProperties: false
    workspace.v1.ListGroupsResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.Group'
          title: groups
      title: ListGroupsResponse
      additionalProperties: false
    workspace.v1.ListInvitationsRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: ListInvitationsRequest
      additionalProperties: false
    workspace.v1.ListInvitationsResponse:
      type: object
      properties:
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.Invitation'
          title: invitations
      title: ListInvitationsResponse
      additionalProperties: false
    workspace.v1.ListMembersRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: ListMembersRequest
      additionalProperties: false
    workspace.v1.ListMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.Membership'
          title: members
      title: ListMembersResponse
      additionalProperties: false
    workspace.v1.ListWorkspacesRequest:
      type: object
      properties:
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: ListWorkspacesRequest
      additionalProperties: false
      description: |-
        ListWorkspaces returns every workspace acting_user_id is an active member
         of, auto-provisioning their PERSONAL workspace on first call.
    workspace.v1.ListWorkspacesResponse:
      type: object
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.Workspace'
          title: workspaces
      title: ListWorkspacesResponse
      additionalProperties: false
    workspace.v1.Membership:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        userId:
          type: string
          title: user_id
        role:
          title: role
          $ref: '#/components/schemas/workspace.v1.Role'
        status:
          title: status
          $ref: '#/components/schemas/workspace.v1.MembershipStatus'
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Membership
      additionalProperties: false
    workspace.v1.ReadRelationTuplesRequest:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
        objectId:
          type: string
          title: object_id
        relation:
          type: string
          title: relation
        subjectUserId:
          type: string
          title: subject_user_id
          description: 'optional: restrict to tuples whose subject is this concrete user.'
        projectId:
          type: string
          title: project_id
      title: ReadRelationTuplesRequest
      additionalProperties: false
      description: |-
        ReadRelationTuples returns stored tuples matching the non-empty filter
         fields (exact match). It does NOT evaluate userset rewrites — it is the
         raw store read. Use Check for permission decisions.
    workspace.v1.ReadRelationTuplesResponse:
      type: object
      properties:
        tuples:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.RelationTuple'
          title: tuples
      title: ReadRelationTuplesResponse
      additionalProperties: false
    workspace.v1.RelationTuple:
      type: object
      properties:
        projectId:
          type: string
          title: project_id
        namespace:
          type: string
          title: namespace
        objectId:
          type: string
          title: object_id
        relation:
          type: string
          title: relation
        subject:
          title: subject
          $ref: '#/components/schemas/workspace.v1.Subject'
      title: RelationTuple
      additionalProperties: false
    workspace.v1.RemoveGroupMemberRequest:
      type: object
      properties:
        groupId:
          type: string
          title: group_id
        member:
          title: member
          $ref: '#/components/schemas/workspace.v1.GroupMember'
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: RemoveGroupMemberRequest
      additionalProperties: false
    workspace.v1.RemoveGroupMemberResponse:
      type: object
      title: RemoveGroupMemberResponse
      additionalProperties: false
    workspace.v1.RemoveMemberRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        userId:
          type: string
          title: user_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: RemoveMemberRequest
      additionalProperties: false
    workspace.v1.RemoveMemberResponse:
      type: object
      title: RemoveMemberResponse
      additionalProperties: false
    workspace.v1.RevokeInvitationRequest:
      type: object
      properties:
        invitationId:
          type: string
          title: invitation_id
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: RevokeInvitationRequest
      additionalProperties: false
    workspace.v1.RevokeInvitationResponse:
      type: object
      title: RevokeInvitationResponse
      additionalProperties: false
    workspace.v1.Subject:
      type: object
      oneOf:
        - properties:
            set:
              title: set
              $ref: '#/components/schemas/workspace.v1.SubjectSet'
          title: set
          required:
            - set
        - properties:
            userId:
              type: string
              title: user_id
          title: user_id
          required:
            - userId
      title: Subject
      additionalProperties: false
      description: 'Subject is the right-hand side of a tuple: a concrete user OR a userset.'
    workspace.v1.SubjectSet:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
        objectId:
          type: string
          title: object_id
        relation:
          type: string
          title: relation
      title: SubjectSet
      additionalProperties: false
      description: |-
        SubjectSet references the set of subjects related to another object — the
         userset `namespace:object_id#relation`. When relation is empty it denotes
         the object itself (rarely needed).
    workspace.v1.TupleUpdate:
      type: object
      properties:
        op:
          title: op
          $ref: '#/components/schemas/workspace.v1.TupleUpdate.Op'
        tuple:
          title: tuple
          $ref: '#/components/schemas/workspace.v1.RelationTuple'
      title: TupleUpdate
      additionalProperties: false
    workspace.v1.UpdateMemberRoleRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        userId:
          type: string
          title: user_id
        role:
          title: role
          $ref: '#/components/schemas/workspace.v1.Role'
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: UpdateMemberRoleRequest
      additionalProperties: false
    workspace.v1.UpdateMemberRoleResponse:
      type: object
      properties:
        membership:
          title: membership
          $ref: '#/components/schemas/workspace.v1.Membership'
      title: UpdateMemberRoleResponse
      additionalProperties: false
    workspace.v1.UpdateWorkspaceRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        displayName:
          type: string
          title: display_name
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
      title: UpdateWorkspaceRequest
      additionalProperties: false
    workspace.v1.UpdateWorkspaceResponse:
      type: object
      properties:
        workspace:
          title: workspace
          $ref: '#/components/schemas/workspace.v1.Workspace'
      title: UpdateWorkspaceResponse
      additionalProperties: false
    workspace.v1.UsersetTree:
      type: object
      properties:
        type:
          title: type
          $ref: '#/components/schemas/workspace.v1.UsersetTree.NodeType'
        userIds:
          type: array
          items:
            type: string
          title: user_ids
          description: 'For LEAF nodes: the concrete subjects and usersets at this node.'
        sets:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.SubjectSet'
          title: sets
        children:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.UsersetTree'
          title: children
          description: 'For UNION nodes: the child subtrees.'
        expanded:
          title: expanded
          description: The userset this node expands.
          $ref: '#/components/schemas/workspace.v1.SubjectSet'
      title: UsersetTree
      additionalProperties: false
    workspace.v1.Workspace:
      type: object
      properties:
        id:
          type: string
          title: id
        projectId:
          type: string
          title: project_id
          description: |-
            project_id is the isolation shard (identity ADR-0002): every row and
             every relation tuple is scoped to it.
        slug:
          type: string
          title: slug
        displayName:
          type: string
          title: display_name
        type:
          title: type
          $ref: '#/components/schemas/workspace.v1.WorkspaceType'
        ownerUserId:
          type: string
          title: owner_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Workspace
      additionalProperties: false
    workspace.v1.WriteRelationTuplesRequest:
      type: object
      properties:
        updates:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.TupleUpdate'
          title: updates
        projectId:
          type: string
          title: project_id
          description: project_id scopes every tuple in the batch; empty = default project.
      title: WriteRelationTuplesRequest
      additionalProperties: false
    workspace.v1.WriteRelationTuplesResponse:
      type: object
      title: WriteRelationTuplesResponse
      additionalProperties: false
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
