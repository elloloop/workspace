          title: user_ids
          description: 'For LEAF nodes: the concrete subjects and usersets at this node.'
        sets:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.SubjectSet'
          title: sets
        children:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.UsersetTree'
          title: children
          description: 'For UNION / INTERSECTION / EXCLUSION nodes: the child subtrees.'
        expanded:
          title: expanded
