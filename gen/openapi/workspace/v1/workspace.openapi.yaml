        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
        tenantId:
          type: string
          title: tenant_id
      title: ListGroupMembersRequest
      additionalProperties: false
    workspace.v1.ListGroupMembersResponse:
