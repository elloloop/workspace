          $ref: '#/components/schemas/workspace.v1.SubjectSet'
        wildcard:
          type: boolean
          title: wildcard
          description: 'For LEAF nodes: true if the public wildcard subject is present.'
      title: UsersetTree
      additionalProperties: false
