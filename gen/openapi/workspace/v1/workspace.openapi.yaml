    workspace.v1.ListWorkspacesResponse:
      type: object
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.Workspace'
          title: workspaces
      title: ListWorkspacesResponse
      additionalProperties: false
