          type: string
          title: id
        projectId:
          type: string
          title: project_id
          description: project_id is the configuration/model shard (identity ADR-0002).
        slug:
          type: string
          title: slug
        displayName:
          type: string
          title: display_name
        type:
          title: type
          $ref: '#/components/schemas/workspace.v1.WorkspaceType'
        ownerUserId:
          type: string
          title: owner_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        tenantId:
          type: string
          title: tenant_id
          description: tenant_id is the data-isolation shard within the project; empty = default.
      title: Workspace
      additionalProperties: false
    workspace.v1.WriteRelationTuplesRequest:
      type: object
      properties:
        updates:
          type: array
          items:
            $ref: '#/components/schemas/workspace.v1.TupleUpdate'
          title: updates
