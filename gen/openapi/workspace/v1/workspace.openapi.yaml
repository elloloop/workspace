      title: Project
      additionalProperties: false
    workspace.v1.ReadRelationTuplesRequest:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
        objectId:
          type: string
          title: object_id
        relation:
          type: string
          title: relation
        subjectUserId:
          type: string
          title: subject_user_id
          description: 'optional: restrict to tuples whose subject is this concrete user.'
        projectId:
          type: string
          title: project_id
        tenantId:
          type: string
          title: tenant_id
      title: ReadRelationTuplesRequest
      additionalProperties: false
      description: |-
