        workspaceId:
          type: string
          title: workspace_id
        userId:
          type: string
          title: user_id
        role:
          title: role
          $ref: '#/components/schemas/workspace.v1.Role'
        actingUserId:
          type: string
          title: acting_user_id
        projectId:
          type: string
          title: project_id
        tenantId:
          type: string
          title: tenant_id
      title: AddMemberRequest
      additionalProperties: false
    workspace.v1.AddMemberResponse:
      type: object
      properties:
        membership:
          title: membership
          $ref: '#/components/schemas/workspace.v1.Membership'
      title: AddMemberResponse
      additionalProperties: false
    workspace.v1.CheckRequest:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
        objectId:
          type: string
          title: object_id
        relation:
          type: string
          title: relation
        subjectUserId:
          type: string
          title: subject_user_id
        projectId:
          type: string
          title: project_id
        tenantId:
          type: string
          title: tenant_id
      title: CheckRequest
      additionalProperties: false
      description: |-
        Check answers "does subject have relation on namespace:object_id?",
         evaluating the namespace's userset rewrite rules transitively.
    workspace.v1.CheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
          title: allowed
      title: CheckResponse
      additionalProperties: false
    workspace.v1.CreateGroupRequest:
      type: object
