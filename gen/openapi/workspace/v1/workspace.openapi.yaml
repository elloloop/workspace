      title: GetWorkspaceResponse
      additionalProperties: false
    workspace.v1.Group:
      type: object
      properties:
        id:
          type: string
          title: id
        projectId:
          type: string
          title: project_id
        workspaceId:
          type: string
          title: workspace_id
          description: |-
            workspace_id optionally scopes the group to a workspace (a company's
             internal groups). Empty for project-level / standalone groups (a B2C
             user's "family" list).
        slug:
          type: string
          title: slug
        displayName:
          type: string
          title: display_name
        createdByUserId:
          type: string
          title: created_by_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        tenantId:
          type: string
          title: tenant_id
      title: Group
      additionalProperties: false
    workspace.v1.GroupMember:
      type: object
      oneOf:
        - properties:
            groupId:
              type: string
              title: group_id
          title: group_id
          required:
            - groupId
        - properties:
            userId:
              type: string
              title: user_id
          title: user_id
          required:
            - userId
      title: GroupMember
      additionalProperties: false
      description: GroupMember is either a user or a nested group.
    workspace.v1.Invitation:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        email:
          type: string
          title: email
        role:
          title: role
          $ref: '#/components/schemas/workspace.v1.Role'
        status:
          title: status
          $ref: '#/components/schemas/workspace.v1.InvitationStatus'
        invitedByUserId:
          type: string
          title: invited_by_user_id
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        token:
          type: string
          title: token
          description: |-
            token is returned ONLY from CreateInvitation so the caller can deliver
             it out of band; it is never echoed by ListInvitations.
        tenantId:
          type: string
          title: tenant_id
      title: Invitation
      additionalProperties: false
    workspace.v1.ListGroupMembersRequest:
