# Per-package coverage floors enforced by scripts/coverage-gate.sh.
# Thresholds sit a few points below the current measured statement coverage,
# leaving headroom for the small run-to-run jitter under -race. cmd/ is
# excluded (exercised by the container-smoke job, not unit coverage).
default: 50

include:
  - internal/
  - pkg/

packages:
  internal/app: 85
  internal/config: 88
  internal/connect: 68
  internal/middleware: 70
  internal/repo/conformance: 55
  internal/repo/memory: 90
  internal/repo/postgres: 78
  internal/service: 60
  pkg/authz: 68
