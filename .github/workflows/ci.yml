name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

# Cancel in-progress runs for the same ref so PR pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.3'
  GOLANGCI_LINT_VERSION: 'v2.12.1'
  GOVULNCHECK_VERSION: 'v1.1.4'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — golangci-lint with the standard linter set.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          # only-new-issues blocks lint regressions on PR diffs while
          # tolerating pre-existing debt on main (tracked separately).
          only-new-issues: true
          args: --config=.golangci.yml

  # ---------------------------------------------------------------------------
  # 1b. go.mod / go.sum cleanliness — prevents drifted module graph.
  # ---------------------------------------------------------------------------
  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go mod tidy
        run: go mod tidy
      - name: Fail if go.mod or go.sum changed
        run: |
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod / go.sum out of sync — run 'go mod tidy' locally and commit the result." >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 2. Vulnerability scan — Go's official CVE checker.
  # ---------------------------------------------------------------------------
  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: govulncheck
        run: govulncheck ./...

  # ---------------------------------------------------------------------------
  # 3. Build + unit tests + coverage gate.
  # ---------------------------------------------------------------------------
  test:
    name: Build + Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.13-alpine3.23
        env:
          POSTGRES_USER: workspaces
          POSTGRES_PASSWORD: workspaces
          POSTGRES_DB: workspaces
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workspaces"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go build
        run: go build ./...

      - name: Wait for coverage backends
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then echo "postgres up"; break; fi
            sleep 1
            if [[ $i -eq 30 ]]; then echo "postgres did not come up"; exit 1; fi
          done

      - name: go test (race + merged coverage)
        env:
          RUN_INTEGRATION_COVERAGE: "1"
          GATEWAY_POSTGRES_DSN: postgres://workspaces:workspaces@localhost:5432/workspaces?sslmode=disable
          GATEWAY_TEST_POSTGRES_DSN: postgres://workspaces:workspaces@localhost:5432/workspaces?sslmode=disable
        run: bash scripts/run-coverage.sh

      - name: Coverage summary
        run: go tool cover -func=cover.out | tail -n 30

      # internal/ coverage jitters under -race because the run is
      # nondeterministic about which driver/error branches execute, so the
      # merged statement count moves run to run. 84% keeps a real floor
      # without the coin-flip. Per-package gates in .coverage-gates.yml
      # stay strict.
      - name: Coverage gate (internal/ >= 84%)
        run: bash scripts/coverage-gate.sh cover.out 84 internal/

      - name: Coverage gate (pkg/ >= 88%)
        run: bash scripts/coverage-gate.sh cover.out 88 pkg/

      - name: Coverage gate (per-package)
        run: bash scripts/coverage-gate.sh cover.out --config .coverage-gates.yml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Boot smoke — would have caught the proto descriptor panic.
  # ---------------------------------------------------------------------------
  smoke:
    name: Boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go test -tags=smoke
        run: |
          if compgen -G "tests/smoke/*.go" > /dev/null; then
            go test -tags=smoke -timeout=120s ./tests/smoke/...
          else
            echo "no smoke tests under tests/smoke — skipping"
          fi

  # ---------------------------------------------------------------------------
  # 5. Integration tests — uses stub persistence; no external services.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16.13-alpine3.23
        env:
          POSTGRES_USER: workspaces
          POSTGRES_PASSWORD: workspaces
          POSTGRES_DB: workspaces
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workspaces"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then echo "postgres up"; break; fi
            sleep 1
            if [[ $i -eq 30 ]]; then echo "postgres did not come up"; exit 1; fi
          done

      - name: go test -tags=integration
        env:
          GATEWAY_POSTGRES_DSN: postgres://workspaces:workspaces@localhost:5432/workspaces?sslmode=disable
          GATEWAY_TEST_POSTGRES_DSN: postgres://workspaces:workspaces@localhost:5432/workspaces?sslmode=disable
        run: |
          if compgen -G "tests/integration/*.go" > /dev/null; then
            go test -tags=integration -race -timeout=180s ./tests/integration/...
          else
            echo "no integration tests under tests/integration — skipping"
          fi

  # ---------------------------------------------------------------------------
  # 6. Fuzz smoke — replay the seed corpus on every PR.
  # ---------------------------------------------------------------------------
  # Per-PR fuzzing replays the committed seed corpus deterministically: every
  # fuzz target runs as an ordinary subtest (no `-fuzz`), so a regression of any
  # known crash fails the PR reproducibly. Live fuzzing (`-fuzz`) is left to the
  # nightly job, which has a generous per-target budget. Time-boxed live fuzzing
  # on a shared PR runner fails non-deterministically with "context deadline
  # exceeded" when a worker is mid-execution as the budget expires — a flake that
  # depends on runner load, not on any input, and blocks unrelated PRs.
  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Replay fuzz seed corpus
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t pkgs < <(
            grep -rEl --include='*_test.go' '^func Fuzz[A-Za-z0-9_]+\(' . \
              | sed -E 's|/[^/]+$||' \
              | sort -u
          )
          if [[ ${#pkgs[@]} -eq 0 ]]; then
            echo "no fuzz targets — skipping"
            exit 0
          fi
          go test -race -timeout=120s "${pkgs[@]}"

  # ---------------------------------------------------------------------------
  # 7. Container build smoke — multi-arch base reachable, Dockerfile builds.
  # ---------------------------------------------------------------------------
  docker:
    name: Container build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker build --target server
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: false
          load: true
          tags: workspaces:ci
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,mode=max,scope=ci-docker

      - name: docker run smoke
        shell: bash
        run: |
          set -euo pipefail
          cid="$(
            docker run -d \
              -e GATEWAY_CONNECT_PORT=8080 \
              -e GATEWAY_METRICS_PORT=9090 \
              -e GATEWAY_DEFAULT_PROJECT_ID=docker-smoke \
              -e GATEWAY_JWT_JWKS_URL= \
              -p 127.0.0.1:18080:8080 \
              workspaces:ci
          )"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/health > /tmp/workspaces-health.json; then
              grep -q '"status":"ok"' /tmp/workspaces-health.json
              exit 0
            fi
            if [[ "$(docker inspect -f '{{.State.Running}}' "$cid")" != "true" ]]; then
              docker logs "$cid"
              exit 1
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1

  # ---------------------------------------------------------------------------
  # Aggregate gate — easy single required check on `main`.
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, tidy, vuln, test, smoke, integration, fuzz, docker]
    if: always()
    steps:
      - name: All required jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          failed = [k for k, v in data.items() if v.get("result") != "success"]
          if failed:
            print("failed:", ", ".join(failed))
            sys.exit(1)
          print("all green")
          '
